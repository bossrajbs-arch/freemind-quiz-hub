<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FREEMIND QUIZ HUB</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(-45deg,#ff0080,#7928ca,#00c6ff,#00ff88);
    background-size:400% 400%;
    animation:bgAnimation 8s ease infinite;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

@keyframes bgAnimation{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius:30px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo-placeholder{
    width:100px;
    height:100px;
    border:3px dashed white;
    border-radius:50%;
    margin:0 auto 20px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:14px;
}

h1{
    color:white;
    font-size:30px;
    margin-bottom:10px;
}

.banner{
    color:white;
    font-size:15px;
    margin-bottom:25px;
}

.level-card{
    background:white;
    border-radius:20px;
    padding:18px;
    margin-bottom:15px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.level-card:hover{
    transform:scale(1.05);
}

.level-card h2{
    color:#7928ca;
    margin-bottom:5px;
}

.level-card p{
    color:#444;
}

footer{
    color:white;
    margin-top:15px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

    <!-- Logo Empty Place -->
    <div class="logo-placeholder">
        LOGO HERE
    </div>

    <h1>FREEMIND QUIZ HUB</h1>

    <div class="banner">
        Learn • Play • Test Your Knowledge
    </div>

    <div class="level-card">
        <h2>Lv.1</h2>
        <p>Class 6 to 8</p>
    </div>

    <div class="level-card">
        <h2>Lv.2</h2>
        <p>Class 9</p>
    </div>

    <div class="level-card">
        <h2>Lv.3</h2>
        <p>Class 10</p>
    </div>

    <div class="level-card">
        <h2>Lv.4</h2>
        <p>Competitive Exam</p>
    </div>

    <footer>
        © FREEMIND QUIZ HUB
    </footer>

</div>

</body>
</html>
